<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Turnstile 验证跳转</title>
</head>
<body>
    <div class="cf-turnstile"
         data-sitekey="0x4AAAAAADHRPsz7BGrK-U0Sd2ConCficI8"
         data-action="web"
         data-callback="onVerified">
    </div>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js"></script>

    <script>
        // 验证成功后触发
        function onVerified(token) {
            // 👇 这里改成你要跳转的链接
            window.location.href = "https://zhangparker.online/zh-cn";
        }
    </script>
</body>
</html>
