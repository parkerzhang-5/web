<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Verification</title>
</head>
<body>
    <!-- 提示文字（初始显示） -->
    <div id="tip">Please verify, thanks</div>

    <!-- Turnstile 验证框（默认隐藏） -->
    <div id="turnstile-box" class="cf-turnstile"
         style="display: none;"
         data-sitekey="0x4AAAAAADHRPsz7BGrK-U0Sd2ConCficI8"
         data-action="web"
         data-callback="goJump">
    </div>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js"></script>

    <script>
        // 页面加载完，显示验证框，隐藏提示
        window.onload = function() {
            document.getElementById("tip").style.display = "none";
            document.getElementById("turnstile-box").style.display = "block";
        };

        // 验证成功跳转
        function goJump() {
            window.location.href = "https://zhangparker.online/zh-cn/"; // 替换成你的链接
        }
    </script>
</body>
</html>
